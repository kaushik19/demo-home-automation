name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # All actions below run on Node 24 to satisfy the GitHub Actions
      # Node 20 deprecation (effective 2026-09-16). Versions reflect the
      # latest majors that ship a Node 24 runtime internally.
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Security audit (production deps only)
        # Fails the pipeline if production deps gain a high/critical CVE
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        env:
          # Repo-name-based base path so /<owner>.github.io/<repo>/ works.
          # vite.config.ts reads this and sets `base` for the build.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA 404 fallback
        # GitHub Pages serves 404.html on unknown paths; copying index.html lets
        # the React Router take over after the static 404 response.
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
