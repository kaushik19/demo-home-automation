name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies (lockfile-strict)
        run: npm ci --no-audit --no-fund

      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check + production build
        run: npm run build
